name: vault-doctor
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Structural integrity check
        # --public-repo: this is a published repo, so flag any internal/private file
        # that is not explicitly cleared with `publish: true`.
        run: python3 97-scripts/vault-doctor.py --strict --public-repo

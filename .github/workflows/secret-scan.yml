name: secret-scan
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.18.4
          mkdir -p "$HOME/bin"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$HOME/bin" gitleaks
          echo "$HOME/bin" >> "$GITHUB_PATH"
          "$HOME/bin/gitleaks" version
      - name: Scan for committed secrets
        # --no-git scans files as they are in this commit, so a secret is caught the moment
        # it is introduced (history-independent, deterministic). Masked example values
        # (• placeholders) are allowlisted in .gitleaks.toml. Exit code 1 on any finding.
        # To also sweep git history, add a second step: `gitleaks git --redact -c .gitleaks.toml`.
        run: gitleaks detect --no-git --source . --config .gitleaks.toml --redact --verbose

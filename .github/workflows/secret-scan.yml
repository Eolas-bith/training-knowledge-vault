name: secret-scan
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for the git-history sweep below
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.18.4
          mkdir -p "$HOME/bin"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$HOME/bin" gitleaks
          echo "$HOME/bin" >> "$GITHUB_PATH"
          "$HOME/bin/gitleaks" version
      - name: Scan working tree for secrets
        # --no-git scans every file's current contents in full — catches a secret present now,
        # regardless of which commit introduced it. Masked example values (• placeholders) are
        # allowlisted in .gitleaks.toml. Exit code 1 on any finding.
        run: gitleaks detect --no-git --source . --config .gitleaks.toml --redact --verbose
      - name: Sweep git history for secrets
        # Default (git) mode scans every commit's diff — catches a secret that was committed and
        # later removed (still exposed in history). Needs the full clone from fetch-depth: 0.
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose
